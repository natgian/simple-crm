<mat-drawer-container class="mat-drawer-container" autosize>
  <mat-drawer #drawer class="sidenav" mode="side" [opened]="true">
    <p>PLATZ FÜR LOGO</p>
  </mat-drawer>

  <div class="sidenav-content">
    <mat-toolbar class="toolbar-row">
      <button class="menu-icon" aria-label="icon-button with menu icon" (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <span>Simple CRM</span>
    </mat-toolbar>
  </div>
</mat-drawer-container>
