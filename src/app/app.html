<mat-drawer-container class="mat-drawer-container" autosize>
  <mat-drawer #drawer class="sidenav" mode="side" [opened]="true">
    <div class="logo-container">
      <img src="/assets/img/logo.png" alt="logo" />
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="" routerLinkActive="active" tabindex="2">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>

      <a mat-list-item routerLink="users" routerLinkActive="active" tabindex="3">
        <mat-icon matListItemIcon>person</mat-icon>
        <span matListItemTitle>Users</span>
      </a>
    </mat-nav-list>
  </mat-drawer>

  <div class="toolbar-container">
    <mat-toolbar class="toolbar-row">
      <button
        class="menu-icon"
        aria-label="icon-button with menu icon"
        (click)="drawer.toggle()"
        tabindex="1"
      >
        <mat-icon>menu</mat-icon>
      </button>

      <span>Simple CRM</span>
    </mat-toolbar>

    <div class="content-container">
      <router-outlet></router-outlet>
    </div>
  </div>
</mat-drawer-container>
