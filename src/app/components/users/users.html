<table mat-table [dataSource]="users()" class="mat-elevation-z8">
  <!-- Name Column -->
  <ng-container matColumnDef="first-name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let element">{{ element.fullName }}</td>
  </ng-container>

  <!-- Birth Date Column -->
  <ng-container matColumnDef="birth-date">
    <th mat-header-cell *matHeaderCellDef>Birth Date</th>
    <td mat-cell *matCellDef="let element">{{ element.birthDate | date }}</td>
  </ng-container>

  <!-- Postal Code Column -->
  <ng-container matColumnDef="postal-code">
    <th mat-header-cell *matHeaderCellDef>Postal Code</th>
    <td mat-cell *matCellDef="let element">{{ element.postalCode }}</td>
  </ng-container>

  <!-- City Column -->
  <ng-container matColumnDef="city">
    <th mat-header-cell *matHeaderCellDef>City</th>
    <td mat-cell *matCellDef="let element">{{ element.city }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

<button
  (click)="openDialog()"
  matFab
  matTooltip="Add a new user"
  aria-label="Button to add a new user"
  class="add-btn"
>
  <mat-icon>add</mat-icon>
</button>
