<mat-card class="user-profile-header">
  <mat-card-header>
    <div mat-card-avatar class="user-profile-container">
      <img src="/assets/img/user_profile.svg" alt="user icon" class="user-profile-img" />
    </div>
    <mat-card-title>{{ currentUser()?.fullName }}</mat-card-title>

    <mat-card-subtitle>{{ currentUser()?.email }}</mat-card-subtitle>
  </mat-card-header>
</mat-card>

<mat-card class="user-details-container">
  <mat-card>
    <mat-card-content>
      <mat-card-title>Personal details</mat-card-title>
    </mat-card-content>
  </mat-card>

  <mat-card class="user-details">
    <mat-card-content>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        height="24px"
        viewBox="0 0 24 24"
        width="24px"
        fill="#e3e3e3"
      >
        <path d="M0 0h24v24H0z" fill="none" />
        <path
          d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"
        />
      </svg>
      <span>{{ currentUser()?.email }}</span>
    </mat-card-content>

    <mat-divider></mat-divider>

    <mat-card-content>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        height="24px"
        viewBox="0 0 24 24"
        width="24px"
        fill="#e3e3e3"
      >
        <path d="M0 0h24v24H0z" fill="none" />
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
      </svg>
      <span
        >{{ currentUser()?.address }}, {{ currentUser()?.postalCode }}
        {{ currentUser()?.city }}</span
      >
    </mat-card-content>

    <mat-divider></mat-divider>

    <mat-card-content>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        height="24px"
        viewBox="0 0 24 24"
        width="24px"
        fill="#e3e3e3"
      >
        <path d="M0 0h24v24H0z" fill="none" />
        <path
          d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z"
        />
      </svg>
      <span>{{ currentUser()?.birthDate | date }}</span>
    </mat-card-content>
  </mat-card>
</mat-card>
