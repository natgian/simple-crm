@if (loading) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
}

<h2 mat-dialog-title>Edit User Details</h2>
<mat-dialog-content class="mt-16">
  <form [formGroup]="userForm" id="userForm">
    <span>Email:</span>
    <div>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" />
        <!-- <mat-hint>Please enter first name</mat-hint> -->
      </mat-form-field>
    </div>

    <span>Birth Date:</span>
    <!-- Birth Date -->
    <div>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Birth Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="birthDate" />
        <!-- <mat-hint>Please enter a date</mat-hint> -->
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>
    </div>

    <span>Address:</span>
    <!-- Address -->
    <div>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Address</mat-label>
        <input matInput formControlName="address" />
        <!-- <mat-hint>Please enter first name</mat-hint> -->
      </mat-form-field>
    </div>

    <!-- Postal Code & City -->
    <div>
      <mat-form-field appearance="outline" class="mr-16">
        <mat-label>Postal Code</mat-label>
        <input matInput formControlName="postalCode" />
        <!-- <mat-hint>Please enter first name</mat-hint> -->
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>City</mat-label>
        <input matInput formControlName="city" />
        <!-- <mat-hint>Please enter last name</mat-hint> -->
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions>
  <button matButton (click)="onNoClick()">Cancel</button>
  <button matButton="filled" [disabled]="userForm.invalid">Save</button>
</mat-dialog-actions>
