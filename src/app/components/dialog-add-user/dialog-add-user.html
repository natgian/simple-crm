<h2 mat-dialog-title>Add User</h2>
<mat-dialog-content>
  <form [formGroup]="userForm" id="userForm">
    <p>Name:</p>
    <div class="fields-container">
      <mat-form-field appearance="outline" class="mr-16">
        <mat-label>First Name</mat-label>
        <input matInput formControlName="firstName" />
        <!-- <mat-hint>Please enter first name</mat-hint> -->
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Last Name</mat-label>
        <input matInput formControlName="lastName" />
        <!-- <mat-hint>Please enter last name</mat-hint> -->
      </mat-form-field>
    </div>

    <p>Birth Date:</p>
    <!-- Birth Date -->
    <div class="fields-container">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Birth Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="birthDate" readonly />
        <!-- <mat-hint>Please enter a date</mat-hint> -->
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>
    </div>

    <p>Address:</p>
    <!-- Address -->
    <div class="fields-container">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Address</mat-label>
        <input matInput formControlName="address" />
        <!-- <mat-hint>Please enter first name</mat-hint> -->
      </mat-form-field>
    </div>

    <!-- Postal Code & City -->
    <div class="fields-container">
      <mat-form-field appearance="outline" class="mr-16">
        <mat-label>Postal Code</mat-label>
        <input matInput formControlName="postalCode" />
        <!-- <mat-hint>Please enter first name</mat-hint> -->
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>City</mat-label>
        <input matInput formControlName="city" />
        <!-- <mat-hint>Please enter last name</mat-hint> -->
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions>
  <button matButton (click)="onNoClick()">Cancel</button>
  <button matButton="filled" [disabled]="userForm.invalid" (click)="onSubmit()">Save</button>
</mat-dialog-actions>
